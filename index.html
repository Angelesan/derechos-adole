<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juventud y Realidad</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#ecf0f1,#fff);color:#2c3e50}

/* NAV */
nav{position:fixed;top:0;width:100%;background:linear-gradient(135deg,#0f4c75,#1b6ca8);padding:15px 40px;display:flex;justify-content:space-between;z-index:1000}
nav .logo{color:#fff;font-weight:700}
nav ul{display:flex;gap:30px;list-style:none}
nav a{color:#fff;text-decoration:none}

/* HERO */
.hero{margin-top:70px;padding:120px;text-align:center;color:#fff;background:linear-gradient(rgba(15,76,117,.8),rgba(27,108,168,.8)),url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b');background-size:cover}
.hero h1{font-size:3rem}

/* CARDS */
.seccion{padding:80px}
.cards-wrapper{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px;max-width:1200px;margin:auto}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.05);text-align:center;transition:.3s}
.card:hover{transform:translateY(-10px)}
.card img{width:100%;height:180px;border-radius:15px;object-fit:cover}

/* ================= PANEL PREMIUM ================= */

.music-panel{
position:fixed;
bottom:20px;
left:0;
transform:translateX(-75%);
transition:.4s;
z-index:9999;
}

.music-panel:hover{
transform:translateX(0);
}

.music-box{
width:260px;
padding:18px;
border-radius:20px;
background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(240,244,248,.85));
backdrop-filter:blur(12px);
box-shadow:0 15px 30px rgba(0,0,0,.2);
border:1px solid rgba(255,255,255,.4);
font-family:Georgia,serif;
}

/* header */
.music-header{
display:flex;
align-items:center;
gap:10px;
color:#0f4c75;
font-weight:700;
margin-bottom:10px;
}
.music-header i{color:#c9a96e}

/* boton */
.music-btn{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0f4c75,#1b6ca8);
color:#fff;
cursor:pointer;
font-weight:600;
transition:.3s;
}
.music-btn:hover{transform:translateY(-2px)}

/* ondas */
.wave{
display:flex;
gap:3px;
justify-content:center;
margin:10px 0;
}
.wave span{
width:4px;
height:10px;
background:#c9a96e;
animation:wave 1s infinite ease-in-out;
}
.wave span:nth-child(2){animation-delay:.2s}
.wave span:nth-child(3){animation-delay:.4s}

@keyframes wave{
0%,100%{height:10px}
50%{height:20px}
}

/* volumen */
.volume-box{display:flex;gap:8px;align-items:center}
.volume-box input{flex:1}

/* voz */
.voice-controls{display:flex;gap:8px;margin-top:10px}
.voice-btn{
flex:1;
padding:8px;
border:none;
border-radius:10px;
background:rgba(15,76,117,.1);
cursor:pointer;
}
.voice-btn.stop{color:#e74c3c}

/* AVATAR */
.virtual-assistant-container{position:fixed;bottom:20px;right:20px}
.dog-illustration{width:120px;border-radius:15px;animation:float 3s infinite}
@keyframes float{50%{transform:translateY(-8px)}}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="Menuprivado.mp3">
</audio>

<nav>
<div class="logo">Juventud y Realidad</div>
<ul>
<li><a href="#">Inicio</a></li>
<li><a href="#">Secciones</a></li>
</ul>
</nav>

<section class="hero">
<h1>Juventud y Realidad</h1>
<p>Información, apoyo y orientación</p>
</section>

<section class="seccion">
<div class="cards-wrapper">
<div class="card"><img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2"><h3>Aspectos Negativos</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1521791136064-7986c2920216"><h3>Información</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><h3>Vida Ideal</h3></div>
</div>
</section>

<!-- PANEL PREMIUM -->
<div class="music-panel">
<div class="music-box">

<div class="music-header">
<i class="fas fa-music"></i>
<span>Reproductor</span>
</div>

<button onclick="toggleMusic()" class="music-btn" id="playBtn">
<i class="fas fa-play"></i> Reproducir
</button>

<div class="wave" id="wave">
<span></span><span></span><span></span>
</div>

<div class="volume-box">
<i class="fas fa-volume-down"></i>
<input type="range" min="0" max="1" step="0.01" value="0.5"
oninput="bgMusic.volume=this.value">
<i class="fas fa-volume-up"></i>
</div>

<div class="voice-controls">
<button onclick="toggleSpeech()" class="voice-btn">
<i class="fas fa-comment"></i>
</button>
<button onclick="pauseSpeech()" class="voice-btn stop">
<i class="fas fa-stop"></i>
</button>
</div>

</div>
</div>

<!-- AVATAR -->
<div class="virtual-assistant-container">
<video id="assistantVideo" class="dog-illustration" muted loop>
<source src="avatar.mp4">
</video>
</div>

<script>
const bgMusic=document.getElementById('bgMusic');
const btn=document.getElementById('playBtn');
const wave=document.getElementById('wave');
const dog=document.getElementById('assistantVideo');

bgMusic.volume=.5;

function toggleMusic(){
if(bgMusic.paused){
bgMusic.play();
btn.innerHTML='<i class="fas fa-pause"></i> Pausar';
wave.style.opacity=1;
}else{
bgMusic.pause();
btn.innerHTML='<i class="fas fa-play"></i> Reproducir';
wave.style.opacity=.3;
}
}

function pauseSpeech(){
speechSynthesis.cancel();
dog.pause();
dog.currentTime=0;
}

function toggleSpeech(){
const text="Bienvenido a Juventud y Realidad.";
const utter=new SpeechSynthesisUtterance(text);
utter.lang='es-MX';

utter.onstart=()=>dog.play();
utter.onend=()=>{dog.pause();dog.currentTime=0;}

speechSynthesis.speak(utter);
}
</script>

</body>
</html>
