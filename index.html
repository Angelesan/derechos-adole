<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derechos de los Adolescentes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#ecf0f1;
}

/* FONDO */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    background:#0f4c75;
    padding:15px;
    color:white;
    text-align:center;
    z-index:1000;
}

/* HERO */
.hero{
    margin-top:70px;
    padding:100px 20px;
    text-align:center;
    background:linear-gradient(135deg,#0f4c75,#1b6ca8);
    color:white;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:60px;
    padding:60px;
}

/* AVATAR */
.card-box{
    text-align:center;
    position:relative;
    cursor:pointer;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    margin-bottom:-50px;
    background-size:cover;
    background-position:center;
    border:4px solid #3498db;
    animation:blink 4s infinite;
}

/* PARPADEO */
@keyframes blink{
    0%,95%,100%{transform:scaleY(1);}
    97%{transform:scaleY(0.1);}
}

.card-box:hover .avatar{
    transform:scale(1.1);
    box-shadow:0 0 30px rgba(52,152,219,.7);
}

/* BURBUJA */
.bubble{
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    background:#0f4c75;
    color:white;
    padding:10px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
}

.card-box:hover .bubble{
    opacity:1;
}

/* CARD */
.card{
    background:white;
    padding:60px 20px 20px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    color:#0f4c75;
}

/* BOTÓN */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#3498db;
    color:white;
    border-radius:20px;
    text-decoration:none;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>Derechos de los Adolescentes ✊</nav>

<section class="hero">
    <h1>Conoce tus derechos</h1>
    <p>Haz clic en los personajes 👇</p>
</section>

<section class="cards">

<!-- CHAN -->
<div class="card-box" onclick="hablar('negativo')">

    <div class="bubble">"Esto está mal..."</div>

    <div class="avatar" style="background-image:url('https://i.postimg.cc/3x3QzSGq/wolf.png')"></div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2">
        <h3>Violación de Derechos</h3>
        <a href="negativo.html" class="btn">Entrar</a>
    </div>
</div>

<!-- CHANGBIN -->
<div class="card-box" onclick="hablar('info')">

    <div class="bubble">"Estos son tus derechos 📚"</div>

    <div class="avatar" style="background-image:url('https://i.postimg.cc/W3h7Yh1k/dwaekki.png')"></div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216">
        <h3>Derechos Fundamentales</h3>
        <a href="informacion.html" class="btn">Entrar</a>
    </div>
</div>

<!-- HYUNJIN -->
<div class="card-box" onclick="hablar('vida')">

    <div class="bubble">"Tú puedes mejorar ✨"</div>

    <div class="avatar" style="background-image:url('https://i.postimg.cc/6pH6sP3F/jiniret.png')"></div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <h3>Bienestar y Desarrollo</h3>
        <a href="vida-ideal.html" class="btn">Entrar</a>
    </div>
</div>

</section>

<script>

/* VOCES */
function hablar(tipo){

    let texto="";
    let vozIndex=0;

    if(tipo==="negativo"){
        texto="Muchos adolescentes sufren violencia y falta de derechos";
        vozIndex=0;
    }

    if(tipo==="info"){
        texto="Tienes derecho a educación, salud y protección";
        vozIndex=1;
    }

    if(tipo==="vida"){
        texto="Tienes derecho a una vida digna y oportunidades";
        vozIndex=2;
    }

    const voces=speechSynthesis.getVoices();
    const mensaje=new SpeechSynthesisUtterance(texto);

    mensaje.lang="es-MX";
    mensaje.voice=voces[vozIndex] || voces[0];

    speechSynthesis.cancel();
    speechSynthesis.speak(mensaje);
}

/* PARTÍCULAS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*3,
        speed:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="rgba(52,152,219,0.5)";
        ctx.fill();

        p.y+=p.speed;

        if(p.y>canvas.height){
            p.y=0;
        }
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
