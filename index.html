<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juventud y Realidad</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ecf0f1,#fff);
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    background:#0f4c75;
    padding:15px;
    color:white;
    text-align:center;
}

/* HERO */
.hero{
    margin-top:70px;
    padding:100px;
    text-align:center;
    background:#1b6ca8;
    color:white;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:60px;
    padding:60px;
}

/* AVATAR */
.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    margin:auto;
    margin-bottom:-50px;
    object-fit:cover;
    border:4px solid #3498db;
    transition:.3s;
}

.card-box{
    text-align:center;
    cursor:pointer;
}

.card-box:hover .avatar{
    transform:scale(1.1);
}

/* CARD */
.card{
    background:white;
    padding:60px 20px 20px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

</style>
</head>

<body>

<nav>Juventud y Realidad 🎤</nav>

<section class="hero">
    <h1>Juventud y Realidad</h1>
    <p>Haz clic en los personajes 👇</p>
</section>

<section class="cards">

<!-- CHAN -->
<div class="card-box" onclick="hablar('chan')">

    <img id="chan" class="avatar" src="https://media.tenor.com/2roX3uxz_68AAAAC/cat-talking.gif">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2">
        <h3>Aspectos Negativos</h3>
    </div>
</div>

<!-- CHANGBIN -->
<div class="card-box" onclick="hablar('bin')">

    <img id="bin" class="avatar" src="https://media.tenor.com/4AiXzf8z6F0AAAAC/talking-animal.gif">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216">
        <h3>Información</h3>
    </div>
</div>

<!-- HYUNJIN -->
<div class="card-box" onclick="hablar('jin')">

    <img id="jin" class="avatar" src="https://media.tenor.com/8cPj9W7K3wQAAAAC/anime-talking.gif">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <h3>Vida Ideal</h3>
    </div>
</div>

</section>

<script>

function hablar(personaje){

    let texto="";

    if(personaje==="chan"){
        texto="Muchos jóvenes enfrentan problemas como violencia y falta de apoyo";
    }

    if(personaje==="bin"){
        texto="Existen datos importantes sobre educación y derechos";
    }

    if(personaje==="jin"){
        texto="Puedes lograr una vida mejor con bienestar emocional";
    }

    const mensaje=new SpeechSynthesisUtterance(texto);
    mensaje.lang="es-MX";

    speechSynthesis.cancel();
    speechSynthesis.speak(mensaje);
}

</script>

</body>
</html>
