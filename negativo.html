<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspectos Negativos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #0f4c75;
    --secondary: #1b6ca8;
    --accent: #3282b8;
    --bg: #f0f4f8;
    --white: rgba(255, 255, 255, 0.95);
    --danger: #e74c3c;
    --gold: #c9a96e;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:var(--bg);color:#2c3e50;line-height:1.8;}

/* ===== HEADER ===== */
header{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:#fff;
    padding:80px 20px;
    text-align:center;
}

/* ===== CONTENIDO ===== */
.container{max-width:1100px;margin:-50px auto 60px;padding:0 20px;}
.glass-panel{
    background:var(--white);
    border-radius:25px;
    padding:40px;
    margin-bottom:40px;
}

h2.seccion-titulo{
    color:var(--primary);
    margin:40px 0 25px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* ===== MUSIC PANEL ===== */
.music-panel{
    position:fixed;
    bottom:20px;
    left:0;
    transform:translateX(-78%);
    transition:.4s;
    z-index:9999;
}
.music-panel:hover{transform:translateX(0);}

.music-box{
    width:280px;
    padding:20px;
    border-radius:0 20px 20px 0;
    background:var(--white);
    box-shadow:10px 0 30px rgba(0,0,0,.15);
}

.music-header{display:flex;gap:10px;font-weight:700;color:var(--primary);}
.music-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:#fff;
    cursor:pointer;
    margin-top:10px;
}

/* WAVE */
.wave{
    display:flex;
    gap:4px;
    justify-content:center;
    margin:15px 0;
    opacity:.3;
}
.wave span{
    width:4px;
    height:10px;
    background:var(--gold);
    animation:wave 1s infinite;
}
.wave span:nth-child(2){animation-delay:.2s;}
.wave span:nth-child(3){animation-delay:.4s;}

@keyframes wave{
0%,100%{height:8px;}
50%{height:20px;}
}

/* VOLUMEN */
.volume-box{
    display:flex;
    align-items:center;
    gap:10px;
}
.volume-box input{
    flex:1;
    accent-color:var(--secondary);
}

/* VOZ */
.voice-controls{display:flex;gap:8px;margin-top:10px;}
.voice-btn{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;}
.voice-btn.stop{color:var(--danger);}

/* AVATAR */
.virtual-assistant-container{
    position:fixed;
    bottom:20px;
    right:20px;
}
.dog-illustration{
    width:130px;
    border-radius:15px;
}
.dog-speaking{
    outline:4px solid var(--accent);
    animation:float 2s infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* BOTÓN SECCIÓN */
.section-speak-btn{
    margin-left:10px;
    border:none;
    padding:5px 10px;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="Menuprivado.mp3" type="audio/mpeg">
</audio>

<header>
    <h1>Aspectos Negativos</h1>
</header>

<div class="container">
    <div class="glass-panel">
        <p>Contenido de ejemplo...</p>
    </div>

    <h2 class="seccion-titulo">Sección 1</h2>
    <div class="glass-panel">
        <p>Texto de sección...</p>
    </div>
</div>

<!-- PANEL MÚSICA -->
<div class="music-panel">
    <div class="music-box">
        <div class="music-header">
            <i class="fas fa-music"></i> Reproductor
        </div>

        <button onclick="toggleMusic()" id="playBtn" class="music-btn">
            <i class="fas fa-play"></i> Reproducir
        </button>

        <div class="wave" id="wave">
            <span></span><span></span><span></span><span></span>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-down"></i>
            <input type="range" min="0" max="1" step="0.01" value="0.5"
                   oninput="bgMusic.volume=this.value">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="voice-controls">
            <button onclick="toggleSpeech()" class="voice-btn">
                <i class="fas fa-comment"></i>
            </button>
            <button onclick="pauseSpeech()" class="voice-btn stop">
                <i class="fas fa-stop"></i>
            </button>
        </div>
    </div>
</div>

<!-- AVATAR -->
<div class="virtual-assistant-container">
    <video id="assistantVideo" class="dog-illustration" muted loop playsinline>
        <source src="avatar.mp4" type="video/mp4">
    </video>
</div>

<script>
const bgMusic = document.getElementById('bgMusic');
const btn = document.getElementById('playBtn');
const wave = document.getElementById('wave');
const dog = document.getElementById('assistantVideo');

bgMusic.volume = 0.5;
wave.style.opacity = 0.3;

/* ===== MÚSICA ===== */
function toggleMusic(){
    if(bgMusic.paused){
        bgMusic.play().then(()=>{
            btn.innerHTML='<i class="fas fa-pause"></i> Pausar';
            wave.style.opacity=1;
        }).catch(()=>console.log("Interacción requerida"));
    }else{
        bgMusic.pause();
        btn.innerHTML='<i class="fas fa-play"></i> Reproducir';
        wave.style.opacity=0.3;
    }
}

/* ===== VOZ ===== */
function speak(text){
    speechSynthesis.cancel();
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='es-MX';

    utter.onstart=()=>{
        dog.classList.add('dog-speaking');
        dog.play();
    };
    utter.onend=()=>{
        dog.classList.remove('dog-speaking');
        dog.pause();
        dog.currentTime=0;
    };

    speechSynthesis.speak(utter);
}

function toggleSpeech(){
    let text='';
    document.querySelectorAll('.glass-panel, h2').forEach(el=>{
        text+=el.innerText+'. ';
    });
    speak(text);
}

function pauseSpeech(){
    speechSynthesis.cancel();
    dog.pause();
    dog.currentTime=0;
    dog.classList.remove('dog-speaking');
}

/* ===== BOTONES POR SECCIÓN ===== */
document.querySelectorAll('h2.seccion-titulo').forEach(title=>{
    const b=document.createElement('button');
    b.className='section-speak-btn';
    b.textContent='Leer';
    b.onclick=()=>{
        let text=title.innerText+'. ';
        let next=title.nextElementSibling;
        while(next && !next.matches('h2')){
            text+=next.innerText+'. ';
            next=next.nextElementSibling;
        }
        speak(text);
    };
    title.appendChild(b);
});
</script>

</body>
</html>
